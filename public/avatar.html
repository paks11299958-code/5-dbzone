<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    model-viewer {
      /* 여기서 로봇이 노출되는 영역 전체 크기를 조절합니다 */
      width: 90%; 
      height: 90%;
    }
  </style>
</head>
<body>
  <model-viewer 
    id="robot"
    src="./RobotExpressive.glb" 
    autoplay 
    camera-controls 
    interaction-prompt="none"
    shadow-intensity="1"
    camera-orbit="0deg 75deg 250%" 
    min-camera-orbit="auto auto 100%"
    style="--poster-color: transparent;">
  </model-viewer>

  <script>
    const modelViewer = document.querySelector('#robot');
    modelViewer.addEventListener('load', () => {
      modelViewer.animationName = "Wave";
      setTimeout(() => { modelViewer.animationName = "Idle"; }, 3000);
    });
  </script>
</body>
</html>
