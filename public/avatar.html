<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #020617 0%, #1e3a8a 100%);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      /* 모바일에서 배경 투명도 및 표시 오류 방지 */
      --poster-color: transparent;
    }
  </style>
</head>
<body>
  <model-viewer 
    id="robot"
    /* 경로 문제 방지를 위해 ./ 제거 시도 가능 */
    src="RobotExpressive.glb" 
    autoplay 
    camera-controls 
    interaction-prompt="none"
    shadow-intensity="1"
    /* 모바일 성능 및 로딩을 위한 옵션 추가 */
    ar-status="not-present"
    touch-action="pan-y"
    loading="eager">
  </model-viewer>

  <script>
    const modelViewer = document.querySelector('#robot');
    
    // 로드 이벤트 발생 시 애니메이션 제어
    modelViewer.addEventListener('load', () => {
      // 사용 가능한 애니메이션 목록 확인 (디버깅용)
      console.log(modelViewer.availableAnimations);
      
      modelViewer.animationName = "Wave";
      setTimeout(() => { 
        modelViewer.animationName = "Idle"; 
      }, 3000);
    });

    // 에러 핸들링 추가 (모바일에서 경로 오류 확인용)
    modelViewer.addEventListener('error', (e) => {
      console.error("모델 로드 실패:", e.detail.source);
    });
  </script>
</body>
</html>
