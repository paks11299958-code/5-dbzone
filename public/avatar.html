<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent; /* 🔴 부모 배경 따라가게 */
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <model-viewer 
    id="robot"
    src="./RobotExpressive.glb"

    autoplay
    camera-controls
    interaction-prompt="none"

    /* 🔥 핵심 설정 */
    camera-orbit="0deg 75deg 2.2m"
    min-camera-orbit="auto auto 1.5m"
    max-camera-orbit="auto auto 3m"
    field-of-view="30deg"

    shadow-intensity="1"
    exposure="1.2"
  >
  </model-viewer>

  <script>
    const modelViewer = document.querySelector('#robot');

    modelViewer.addEventListener('load', () => {
      modelViewer.animationName = "Wave";
      setTimeout(() => {
        modelViewer.animationName = "Idle";
      }, 3000);
    });
  </script>
</body>
</html>
