
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DBZone | 오라클 데이터베이스 전문 기술 지원</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #f8fafc;
            /* 기본적으로 단어 단위 줄바꿈을 선호하되, 넘칠 경우 브레이크 방지 */
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(226, 232, 240, 1);
        }
        .corporate-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc48?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.04;
            filter: grayscale(100%);
        }
        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.07), transparent 40%);
        }
        /* 모바일에서 텍스트가 잘리지 않도록 강제 설정 */
        .break-keep-all {
            word-break: keep-all;
            overflow-wrap: break-word;
        }
    </style>
    <script type="importmap">

      "imports": {
        "react": "https://esm.sh/react@19.0.0",

        "@google/genai": "https://esm.sh/@google/genai",
        "react/": "https://esm.sh/react@19.0.0/",
        "react-dom/": "https://esm.sh/react-dom@19.0.0/"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
